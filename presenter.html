<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Pulse Check — Presenter View</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3-cloud/1.2.5/d3.layout.cloud.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@300;400;600;700&display=swap');

  :root {
    --bg: #06060e;
    --surface: #0f0f1a;
    --card: #14141f;
    --cyan: #00e5ff;
    --purple: #b44fff;
    --green: #00ff94;
    --yellow: #ffe566;
    --text: #e8e8f0;
    --muted: #555570;
    --border: rgba(0,229,255,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: grid;
    grid-template-rows: auto 1fr auto;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(0,229,255,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(180,79,255,0.04) 0%, transparent 50%);
    pointer-events: none;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 40px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--cyan);
    letter-spacing: 3px;
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(0,255,148,0.08);
    border: 1px solid rgba(0,255,148,0.2);
    border-radius: 20px;
    padding: 6px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--green);
    letter-spacing: 2px;
  }

  .live-dot {
    width: 7px; height: 7px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .voter-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--muted);
  }

  .voter-count span {
    color: var(--purple);
    font-size: 18px;
    font-weight: 700;
  }

  /* Main grid */
  main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 16px;
    padding: 16px 40px;
    overflow: hidden;
  }

  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 14px;
    flex-shrink: 0;
  }

  .panel-title span {
    color: var(--cyan);
    margin-right: 6px;
  }

  /* Bar charts */
  .bars { display: flex; flex-direction: column; gap: 10px; flex: 1; justify-content: center; }

  .bar-row { display: flex; align-items: center; gap: 10px; }

  .bar-label {
    font-size: 12px;
    color: var(--text);
    min-width: 160px;
    flex-shrink: 0;
    line-height: 1.3;
  }

  .bar-track {
    flex: 1;
    height: 28px;
    background: var(--surface);
    border-radius: 6px;
    overflow: hidden;
    position: relative;
  }

  .bar-fill {
    height: 100%;
    border-radius: 6px;
    transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    min-width: 2px;
  }

  .bar-pct {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 36px;
    text-align: right;
    flex-shrink: 0;
  }

  /* Word cloud panel */
  #wordcloudPanel { grid-column: 1 / -1; }
  #wordcloudSvg { flex: 1; width: 100%; }

  /* Footer */
  footer {
    padding: 12px 40px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  .qr-hint {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .qr-hint strong { color: var(--cyan); }

  /* Q3 & Q4 span full width too */
  #q3panel, #q4panel { grid-column: span 1; }
</style>
</head>
<body>

<header>
  <div class="logo">// AI PULSE CHECK</div>
  <div class="live-badge"><div class="live-dot"></div>LIVE</div>
  <div class="voter-count">Responses: <span id="voterCount">0</span></div>
</header>

<main>
  <!-- Q1 -->
  <div class="panel" id="q1panel">
    <div class="panel-title"><span>Q1</span> Hit rate limits 5+ times in 2 months?</div>
    <div class="bars" id="q1bars"></div>
  </div>

  <!-- Q2 -->
  <div class="panel" id="q2panel">
    <div class="panel-title"><span>Q2</span> Thought AI was a passing phase 2 years ago?</div>
    <div class="bars" id="q2bars"></div>
  </div>

  <!-- Q3 -->
  <div class="panel" id="q3panel">
    <div class="panel-title"><span>Q3</span> Enjoy coding more before or with AI?</div>
    <div class="bars" id="q3bars"></div>
  </div>

  <!-- Q4 -->
  <div class="panel" id="q4panel">
    <div class="panel-title"><span>Q4</span> Most exciting AI capability right now?</div>
    <div class="bars" id="q4bars"></div>
  </div>
</main>

<footer>
  <div class="qr-hint">Scan QR or visit → <strong id="siteUrl">your-site.github.io/ai-quiz</strong> to vote</div>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── PASTE YOUR FIREBASE CONFIG HERE ──────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyBw3n314uKutsZnBW0fQoOdhIlggRMmyoQ",
  authDomain: "ai-pulse-check.firebaseapp.com",
  projectId: "ai-pulse-check",
  storageBucket: "ai-pulse-check.firebasestorage.app",
  messagingSenderId: "55177296999",
  appId: "1:55177296999:web:b20bc8f5d10a75c44868c2"
};
// ─────────────────────────────────────────────────────────────────────────

const QUESTIONS = {
  q1: { options: ["Yes — all the time 🔥", "No — not yet"] },
  q2: { options: ["Yes — I was skeptical 😅", "No — I saw it coming 🚀"] },
  q3: { options: ["Before AI — pure craft 🛠️", "With AI — superpowered ⚡", "Equally both 🤝"] },
  q4: { options: ["Agents & automation 🤖", "Code generation 💻", "Multimodal (vision/voice) 👁️", "RAG & knowledge systems 📚"] }
};

const COLORS = {
  q1: ["00e5ff", "b44fff"],
  q2: ["ffe566", "b44fff"],
  q3: ["00ff94", "00e5ff", "b44fff"],
  q4: ["00e5ff", "00ff94", "ffe566", "b44fff"]
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allVotes = {};

onSnapshot(collection(db, 'quiz_votes'), (snapshot) => {
  allVotes = {};
  snapshot.forEach(doc => { allVotes[doc.id] = doc.data(); });
  updateAll();
});

function updateAll() {
  const count = Object.keys(allVotes).length;
  document.getElementById('voterCount').textContent = count;

  ['q1','q2','q3','q4'].forEach(qId => {
    const tally = {};
    QUESTIONS[qId].options.forEach(o => tally[o] = 0);
    Object.values(allVotes).forEach(v => {
      if (v[qId] && tally[v[qId]] !== undefined) tally[v[qId]]++;
    });
    renderBars(qId, tally, count);
  });
}

function renderBars(qId, tally, total) {
  const container = document.getElementById(qId + 'bars');
  const entries = Object.entries(tally);
  const max = Math.max(...entries.map(e => e[1]), 1);

  container.innerHTML = entries.map(([label, count], i) => {
    const pct = total > 0 ? Math.round((count / total) * 100) : 0;
    const barW = total > 0 ? Math.round((count / total) * 100) : 0;
    const color = COLORS[qId][i] || '6b6b80';
    return `
      <div class="bar-row">
        <div class="bar-label">${label}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${barW}%; background: #${color}22; border: 1px solid #${color}66;">
          </div>
        </div>
        <div class="bar-pct" style="color:#${color}">${pct}%</div>
      </div>
    `;
  }).join('');
}

// Init with zeros
updateAll();
</script>
</body>
</html>
